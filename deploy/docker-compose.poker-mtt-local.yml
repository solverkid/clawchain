services:
  poker_mtt_redis:
    image: redis:7-alpine
    container_name: poker-mtt-redis
    ports:
      - "36379:6379"
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  poker_mtt_dynamodb:
    image: amazon/dynamodb-local:2.5.4
    container_name: poker-mtt-dynamodb
    ports:
      - "38000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  poker_mtt_rmqnamesrv:
    image: apache/rocketmq:5.3.2
    container_name: poker-mtt-rmqnamesrv
    ports:
      - "39876:9876"
    command: sh mqnamesrv

  poker_mtt_rmqbroker:
    image: apache/rocketmq:5.3.2
    container_name: poker-mtt-rmqbroker
    depends_on:
      - poker_mtt_rmqnamesrv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      - NAMESRV_ADDR=poker_mtt_rmqnamesrv:9876
    volumes:
      - ./poker-mtt/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q 'boot success' /home/rocketmq/logs/rocketmqlogs/broker.log",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  poker_mtt_rmqproxy:
    image: apache/rocketmq:5.3.2
    container_name: poker-mtt-rmqproxy
    depends_on:
      poker_mtt_rmqnamesrv:
        condition: service_started
      poker_mtt_rmqbroker:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "38080:8080"
      - "38081:8081"
    environment:
      - NAMESRV_ADDR=poker_mtt_rmqnamesrv:9876
    volumes:
      - ./poker-mtt/rocketmq/rmq-proxy.json:/home/rocketmq/rocketmq-5.3.2/conf/rmq-proxy.json
    command:
      - /bin/sh
      - -lc
      - >-
        until /home/rocketmq/rocketmq-5.3.2/bin/mqadmin updatetopic -n poker_mtt_rmqnamesrv:9876 -c DefaultCluster -t DefaultHeartBeatSyncerTopic >/dev/null 2>&1; do
          sleep 1;
        done;
        exec sh mqproxy -pc /home/rocketmq/rocketmq-5.3.2/conf/rmq-proxy.json
